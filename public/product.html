<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product – MediShop</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div id="nav-root"></div>

<div class="container page-content" id="main-content">
  <div class="skeleton" style="height:400px;border-radius:10px"></div>
</div>

<div id="footer-root"></div>

<script src="/js/api.js"></script>
<script src="/js/ui.js"></script>
<script>
  document.getElementById('nav-root').innerHTML = renderNavbar();
  document.getElementById('footer-root').innerHTML = renderFooter();

  const pid = new URLSearchParams(location.search).get('id');
  let qty = 1;
  let product = null;

  if (!pid) { location.href = '/'; }

  async function init() {
    try {
      product = await API.products.get(pid);
      document.title = `${product.name} – MediShop`;
      renderProduct(product);
      if (API.isLoggedIn()) updateCartBadge();
      loadRelated(product.category, product.id);
    } catch {
      document.getElementById('main-content').innerHTML = '<div class="empty-state"><div style="font-size:4rem">❌</div><h3>Product not found</h3><button class="btn btn-primary" onclick="location.href=\'/\'">Back to Home</button></div>';
    }
  }

  function renderProduct(p) {
    document.getElementById('main-content').innerHTML = `
      <!-- BREADCRUMB -->
      <div class="breadcrumb">
        <a href="/">Home</a>
        <span>›</span>
        <a href="/?category=${encodeURIComponent(p.category)}">${p.category}</a>
        <span>›</span>
        <span>${p.name}</span>
      </div>

      <!-- PRODUCT DETAIL -->
      <div class="product-detail-wrap">
        <div class="product-detail-img">
          <img src="/images/${p.image}" alt="${p.name}"
            onerror="this.style.display='none';document.getElementById('emoji-fallback').style.display='flex'">
          <div id="emoji-fallback" style="display:none;font-size:7rem;width:100%;height:100%;align-items:center;justify-content:center">${medicineIcon(p.category)}</div>
        </div>

        <div class="product-detail-info">
          ${p.prescription_required ? `<div style="color:#991b1b;font-size:0.82rem;font-weight:700;background:#fee2e2;padding:0.35rem 0.75rem;border-radius:4px;width:fit-content">Rx PRESCRIPTION REQUIRED</div>` : ''}
          <h1 class="detail-name">${p.name}</h1>
          <div class="detail-generic">${p.generic_name}</div>
          <div class="detail-mfr">by <strong>${p.manufacturer}</strong></div>
          <div style="height:1px;background:var(--border)"></div>
          <div class="detail-price-block">
            <span class="detail-price">₹${p.price.toFixed(2)}</span>
            <span class="detail-mrp">MRP ₹${p.mrp.toFixed(2)}</span>
            ${p.discount ? `<span class="detail-discount">${p.discount}% off</span>` : ''}
          </div>
          <div class="detail-pack">Pack of: <strong>${p.pack_size}</strong></div>
          <div style="font-size:0.85rem;color:${p.stock > 0 ? '#166534' : '#991b1b'};font-weight:600">
            ${p.stock > 20 ? '✅ In Stock' : p.stock > 0 ? `⚠️ Only ${p.stock} left` : '❌ Out of Stock'}
          </div>

          <div class="qty-row">
            <div class="qty-control">
              <button class="qty-btn" onclick="changeQty(-1)">−</button>
              <input class="qty-num" type="number" id="qty-input" value="1" min="1" max="${p.stock}" onchange="qty=parseInt(this.value)||1">
              <button class="qty-btn" onclick="changeQty(1)">+</button>
            </div>
            <button class="btn btn-primary btn-lg" onclick="addToCart()" id="add-cart-btn" ${p.stock === 0 ? 'disabled' : ''}>
              🛒 Add to Cart
            </button>
          </div>

          <button class="btn btn-outline btn-full" onclick="buyNow()" ${p.stock === 0 ? 'disabled' : ''}>
            ⚡ Buy Now
          </button>

          <div class="info-box">
            <h4>Dosage</h4>
            <p>${p.dosage}</p>
          </div>

          ${p.prescription_required ? `
          <div class="info-box rx-warning">
            <h4>⚠️ Prescription Required</h4>
            <p>This medicine requires a valid prescription from a registered medical practitioner. Please upload your prescription during checkout.</p>
          </div>` : ''}
        </div>
      </div>

      <!-- DESCRIPTION -->
      <div style="background:white;border:1px solid var(--border);border-radius:10px;padding:1.75rem;margin-bottom:1.5rem">
        <h2 style="font-size:1.1rem;font-weight:700;margin-bottom:1rem">About ${p.name}</h2>
        <p style="line-height:1.7;color:var(--text-muted)">${p.description}</p>

        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-top:1.5rem">
          <div style="background:var(--bg);padding:1rem;border-radius:8px">
            <div style="font-size:0.75rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px">Category</div>
            <div style="font-weight:600;margin-top:0.25rem">${p.category}</div>
          </div>
          <div style="background:var(--bg);padding:1rem;border-radius:8px">
            <div style="font-size:0.75rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px">Manufacturer</div>
            <div style="font-weight:600;margin-top:0.25rem">${p.manufacturer}</div>
          </div>
          <div style="background:var(--bg);padding:1rem;border-radius:8px">
            <div style="font-size:0.75rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px">Pack Size</div>
            <div style="font-weight:600;margin-top:0.25rem">${p.pack_size}</div>
          </div>
          <div style="background:var(--bg);padding:1rem;border-radius:8px">
            <div style="font-size:0.75rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px">Prescription</div>
            <div style="font-weight:600;margin-top:0.25rem">${p.prescription_required ? 'Required' : 'Not Required'}</div>
          </div>
        </div>
      </div>

      <!-- RELATED PRODUCTS -->
      <div>
        <div class="section-header">
          <h2 class="section-title">More in ${p.category}</h2>
          <a class="section-link" href="/?category=${encodeURIComponent(p.category)}">View All →</a>
        </div>
        <div class="products-grid" id="related-grid">
          <div class="skeleton" style="height:280px;border-radius:10px"></div>
          <div class="skeleton" style="height:280px;border-radius:10px"></div>
          <div class="skeleton" style="height:280px;border-radius:10px"></div>
        </div>
      </div>
    `;
  }

  async function loadRelated(category, excludeId) {
    const all = await API.products.list({ category });
    const related = all.filter(p => p.id != excludeId).slice(0, 4);
    document.getElementById('related-grid').innerHTML = related.length
      ? related.map(renderProductCard).join('')
      : '<p style="color:var(--text-muted)">No other products in this category.</p>';
  }

  function changeQty(delta) {
    qty = Math.max(1, Math.min(product?.stock || 99, qty + delta));
    document.getElementById('qty-input').value = qty;
  }

  async function addToCart() {
    if (!API.isLoggedIn()) { toast('Please login to add items to cart', 'error'); setTimeout(() => location.href = '/login.html', 1200); return; }
    const btn = document.getElementById('add-cart-btn');
    btn.disabled = true;
    try {
      await API.cart.add(parseInt(pid), qty);
      toast('Added to cart!');
      updateCartBadge();
    } catch (e) {
      toast(e.message, 'error');
    } finally {
      btn.disabled = false;
    }
  }

  async function buyNow() {
    if (!API.isLoggedIn()) { toast('Please login first', 'error'); setTimeout(() => location.href = '/login.html', 1200); return; }
    try {
      await API.cart.add(parseInt(pid), qty);
      location.href = '/checkout.html';
    } catch (e) {
      toast(e.message, 'error');
    }
  }

  init();
</script>
</body>
</html>
