<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart – MediShop</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div id="nav-root"></div>

<div class="container page-content">
  <div class="breadcrumb">
    <a href="/">Home</a>
    <span>›</span>
    <span>My Cart</span>
  </div>
  <h1 style="font-size:1.5rem;font-weight:800;margin-bottom:1.5rem">Shopping Cart</h1>
  <div id="cart-content">
    <div class="skeleton" style="height:300px;border-radius:10px"></div>
  </div>
</div>

<div id="footer-root"></div>

<script src="/js/api.js"></script>
<script src="/js/ui.js"></script>
<script>
  document.getElementById('nav-root').innerHTML = renderNavbar();
  document.getElementById('footer-root').innerHTML = renderFooter();

  let cartItems = [];

  async function init() {
    if (!API.isLoggedIn()) {
      document.getElementById('cart-content').innerHTML = `
        <div class="empty-state">
          <div style="font-size:4rem">🛒</div>
          <h3>Please login to view your cart</h3>
          <p>Sign in to access your saved items</p>
          <a href="/login.html" class="btn btn-primary btn-lg">Login Now</a>
        </div>`;
      return;
    }
    cartItems = await API.cart.list();
    renderCart();
    updateCartBadge();
  }

  function renderCart() {
    const container = document.getElementById('cart-content');
    if (!cartItems.length) {
      container.innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <h3>Your cart is empty</h3>
          <p>Browse our medicines and add items to your cart</p>
          <a href="/" class="btn btn-primary btn-lg">Browse Medicines</a>
        </div>`;
      return;
    }

    const subtotal = cartItems.reduce((s, i) => s + i.price * i.quantity, 0);
    const delivery = subtotal >= 499 ? 0 : 40;
    const total = subtotal + delivery;
    const savings = cartItems.reduce((s, i) => s + (i.mrp - i.price) * i.quantity, 0);

    container.innerHTML = `
      <div class="cart-layout">
        <div>
          <div class="cart-items-wrap">
            <div class="cart-header">
              <span>${cartItems.length} item(s)</span>
              <button class="btn btn-danger" style="font-size:0.8rem;padding:0.35rem 0.75rem" onclick="clearCart()">Clear Cart</button>
            </div>
            ${cartItems.map(item => `
              <div class="cart-item" id="item-${item.id}">
                <div class="cart-item-img" onclick="location.href='/product.html?id=${item.product_id}'" style="cursor:pointer">
                  <img src="/images/${item.image}" alt="${item.name}"
                    onerror="this.style.display='none';this.parentElement.innerHTML='<span style=\'font-size:2rem\'>💊</span>'">
                </div>
                <div class="cart-item-info">
                  <div class="cart-item-name" onclick="location.href='/product.html?id=${item.product_id}'" style="cursor:pointer">${item.name}</div>
                  <div class="cart-item-sub">${item.pack_size}</div>
                  ${item.prescription_required ? '<div style="font-size:0.72rem;color:#991b1b;font-weight:600">Rx required</div>' : ''}
                  <div class="cart-item-sub">₹${item.price.toFixed(2)} each · <s>₹${item.mrp.toFixed(2)}</s></div>
                </div>
                <div class="cart-item-actions">
                  <div class="cart-item-price">₹${(item.price * item.quantity).toFixed(2)}</div>
                  <div class="qty-control">
                    <button class="qty-btn" onclick="updateQty(${item.id}, ${item.quantity - 1})">−</button>
                    <span class="qty-num">${item.quantity}</span>
                    <button class="qty-btn" onclick="updateQty(${item.id}, ${item.quantity + 1})">+</button>
                  </div>
                  <button class="remove-btn" onclick="removeItem(${item.id})">✕ Remove</button>
                </div>
              </div>
            `).join('')}
          </div>
          ${savings > 0 ? `<div style="background:#dcfce7;color:#166534;padding:0.75rem 1rem;border-radius:8px;margin-top:0.75rem;font-size:0.875rem;font-weight:600">
            🎉 You're saving ₹${savings.toFixed(2)} on this order!
          </div>` : ''}
        </div>

        <div class="cart-summary">
          <h3>Order Summary</h3>
          ${subtotal >= 499 ? '<div class="free-delivery-note">✅ You qualify for free delivery!</div>' : `<div class="free-delivery-note">Add ₹${(499 - subtotal).toFixed(2)} more for free delivery</div>`}
          <div class="summary-row"><span>Subtotal (${cartItems.length} items)</span><span>₹${subtotal.toFixed(2)}</span></div>
          <div class="summary-row"><span>Delivery Fee</span><span>${delivery === 0 ? '<strong style="color:#166534">FREE</strong>' : '₹' + delivery.toFixed(2)}</span></div>
          ${savings > 0 ? `<div class="summary-row" style="color:#166534"><span>Savings</span><span>-₹${savings.toFixed(2)}</span></div>` : ''}
          <div class="summary-row total"><span>Total</span><span>₹${total.toFixed(2)}</span></div>
          <a href="/checkout.html" class="btn btn-primary btn-full btn-lg" style="margin-top:1rem;text-align:center;display:flex">
            Proceed to Checkout →
          </a>
          <a href="/" class="btn btn-outline btn-full" style="margin-top:0.75rem;text-align:center;display:flex">
            Continue Shopping
          </a>
        </div>
      </div>
    `;
  }

  async function updateQty(itemId, newQty) {
    if (newQty < 1) { removeItem(itemId); return; }
    try {
      await API.cart.update(itemId, newQty);
      cartItems = cartItems.map(i => i.id === itemId ? { ...i, quantity: newQty } : i);
      renderCart();
      updateCartBadge();
    } catch (e) { toast(e.message, 'error'); }
  }

  async function removeItem(itemId) {
    try {
      await API.cart.remove(itemId);
      cartItems = cartItems.filter(i => i.id !== itemId);
      renderCart();
      updateCartBadge();
      toast('Item removed from cart');
    } catch (e) { toast(e.message, 'error'); }
  }

  async function clearCart() {
    if (!confirm('Remove all items from cart?')) return;
    try {
      await API.cart.clear();
      cartItems = [];
      renderCart();
      updateCartBadge();
      toast('Cart cleared');
    } catch (e) { toast(e.message, 'error'); }
  }

  init();
</script>
</body>
</html>
