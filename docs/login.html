<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – MediShop</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div style="font-size:2.5rem;margin-bottom:0.5rem">💊</div>
      <h1>MediShop</h1>
      <p>Your trusted online pharmacy</p>
    </div>
    <div class="auth-body">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Login</button>
        <button class="auth-tab" onclick="switchTab('register')">Register</button>
      </div>

      <!-- LOGIN -->
      <form class="auth-form active" id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email Address</label>
          <input class="form-control" type="email" id="login-email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input class="form-control" type="password" id="login-password" placeholder="••••••••" required>
        </div>
        <button class="btn btn-primary btn-full btn-lg" type="submit">Login to MediShop</button>
        <div class="form-error" id="login-error"></div>
        <div class="divider">or try demo account</div>
        <button type="button" class="btn btn-outline btn-full" onclick="fillDemo()">Use Demo Account</button>
      </form>

      <!-- REGISTER -->
      <form class="auth-form" id="register-form" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>Full Name</label>
          <input class="form-control" type="text" id="reg-name" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input class="form-control" type="email" id="reg-email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input class="form-control" type="tel" id="reg-phone" placeholder="+91 98765 43210">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input class="form-control" type="password" id="reg-password" placeholder="Min. 6 characters" required minlength="6">
        </div>
        <button class="btn btn-primary btn-full btn-lg" type="submit" id="reg-btn">Create Account</button>
        <div class="form-error" id="reg-error"></div>
        <div class="form-success" id="reg-success" style="display:none"></div>
      </form>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script>
  if (Auth.isLoggedIn()) location.href = 'index.html';

  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'login')));
    document.querySelectorAll('.auth-form').forEach((f, i) => f.classList.toggle('active', (i === 0) === (tab === 'login')));
  }

  function handleLogin(e) {
    e.preventDefault();
    const errEl = document.getElementById('login-error');
    errEl.textContent = '';
    try {
      Auth.login(
        document.getElementById('login-email').value,
        document.getElementById('login-password').value
      );
      location.href = 'index.html';
    } catch (err) {
      errEl.textContent = err.message;
    }
  }

  function handleRegister(e) {
    e.preventDefault();
    const errEl = document.getElementById('reg-error');
    const sucEl = document.getElementById('reg-success');
    errEl.textContent = ''; sucEl.style.display = 'none';
    const btn = document.getElementById('reg-btn');
    btn.disabled = true;
    try {
      Auth.register(
        document.getElementById('reg-name').value,
        document.getElementById('reg-email').value,
        document.getElementById('reg-password').value,
        document.getElementById('reg-phone').value
      );
      sucEl.textContent = 'Account created! Redirecting...';
      sucEl.style.display = 'block';
      setTimeout(() => location.href = 'index.html', 1000);
    } catch (err) {
      errEl.textContent = err.message;
      btn.disabled = false;
    }
  }

  function fillDemo() {
    document.getElementById('login-email').value = 'demo@medishop.com';
    document.getElementById('login-password').value = 'demo123';
  }
</script>
</body>
</html>
